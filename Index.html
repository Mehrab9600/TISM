<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>The Indian Swaad Menu</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-main: #08080a;
      --bg-card: #111114;
      --border-subtle: rgba(255, 255, 255, 0.06);
      --text-main: #f3f4f6;
      --text-muted: #8a8a93;
      --accent-gold: #e5c453;
      --easing-smooth: cubic-bezier(0.16, 1, 0.3, 1);
      --shape-radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background-color: var(--bg-main);
      color: var(--text-main);
      font-family: 'Plus Jakarta Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .menu-hero {
      text-align: center;
      padding: 60px 20px 30px;
    }

    .menu-hero h1 {
      font-family: 'Outfit', sans-serif;
      font-size: 38px;
      font-weight: 600;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    .menu-hero p {
      color: var(--accent-gold);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.9;
    }

    .nav-container-outer {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(8, 8, 10, 0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border-subtle);
    }

    .slider-container-relative {
      max-width: 1200px;
      margin: 0 auto;
      position: relative;
      display: flex;
      align-items: center;
    }

    .slider-container-relative::before,
    .slider-container-relative::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      width: 60px;
      z-index: 5;
      pointer-events: none;
    }
    .slider-container-relative::before {
      left: 0;
      background: linear-gradient(to right, var(--bg-main) 10%, transparent 100%);
    }
    .slider-container-relative::after {
      right: 0;
      background: linear-gradient(to left, var(--bg-main) 10%, transparent 100%);
    }

    .slider-wrapper {
      width: 100%;
      overflow-x: auto;
      scrollbar-width: none;
      scroll-behavior: smooth;
    }

    .slider-wrapper::-webkit-scrollbar {
      display: none;
    }

    .slider-track {
      display: flex;
      gap: 28px;
      padding: 16px 60px;
      position: relative;
    }

    .slider-item {
      color: var(--text-muted);
      font-family: 'Outfit', sans-serif;
      font-size: 14.5px;
      font-weight: 500;
      white-space: nowrap;
      cursor: pointer;
      background: none;
      border: none;
      padding: 6px 0 10px 0;
      transition: color 0.3s var(--easing-smooth);
    }

    .slider-item:hover {
      color: var(--text-main);
    }

    .slider-item.active {
      color: var(--text-main);
      font-weight: 600;
    }

    .sliding-line-indicator {
      position: absolute;
      bottom: 14px;
      left: 0;
      height: 2.5px;
      background: var(--accent-gold);
      border-radius: 4px;
      box-shadow: 0 0 8px var(--accent-gold);
      transition: all 0.35s var(--easing-smooth);
      pointer-events: none;
    }

    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      background: #141417;
      border: 1px solid var(--border-subtle);
      border-radius: 50%;
      color: var(--text-main);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      z-index: 10;
      transition: all 0.3s var(--easing-smooth);
      opacity: 0;
      pointer-events: none;
    }

    .nav-arrow.visible {
      opacity: 1;
      pointer-events: auto;
    }

    .nav-arrow:hover {
      background: var(--text-main);
      color: var(--bg-main);
      border-color: var(--text-main);
    }

    .nav-arrow-left { left: 16px; }
    .nav-arrow-right { right: 16px; }

    .nav-arrow svg {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .menu-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 30px 20px 80px;
    }

    .category-section-title {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 600;
      margin-bottom: 4px;
      letter-spacing: -0.3px;
    }

    .category-section-desc {
      color: var(--text-muted);
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 24px;
      max-width: 800px;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 16px;
    }

    @media (min-width: 768px) {
      .menu-grid {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    .menu-card {
      background: var(--bg-card);
      border: 1px solid var(--border-subtle);
      border-radius: var(--shape-radius);
      padding: 20px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      transition: border-color 0.3s var(--easing-smooth), background-color 0.3s var(--easing-smooth);
    }

    .menu-card:hover {
      border-color: rgba(255, 255, 255, 0.12);
      background-color: #151519;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 8px;
    }

    .dish-title {
      font-family: 'Outfit', sans-serif;
      font-size: 16.5px;
      font-weight: 600;
      color: var(--text-main);
      line-height: 1.3;
    }

    .dish-price {
      font-size: 14px;
      font-weight: 600;
      color: var(--accent-gold);
      white-space: nowrap;
    }

    .dish-desc {
      font-size: 13px;
      line-height: 1.5;
      color: var(--text-muted);
    }

    .fade-in-up {
      animation: fadeInUp 0.35s var(--easing-smooth) forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

    const wrapper = document.getElementById('slider-wrapper');
    const track = document.getElementById('slider-track');
    const menuView = document.getElementById('menu-view');
    const arrowLeft = document.getElementById('arrow-left');
    const arrowRight = document.getElementById('arrow-right');
    const lineIndicator = document.getElementById('line-indicator');

    function updateIndicator(activeTab) {
      if (!activeTab) return;
      lineIndicator.style.width = `${activeTab.offsetWidth}px`;
      lineIndicator.style.left = `${activeTab.offsetLeft}px`;
    }

    function handleArrowsVisibility() {
      const scrollLeft = wrapper.scrollLeft;
      const maxScroll = wrapper.scrollWidth - wrapper.clientWidth;
      arrowLeft.classList.toggle('visible', scrollLeft > 6);
      arrowRight.classList.toggle('visible', scrollLeft < maxScroll - 6);
    }

    function displayCategory(categoryKey) {
      const data = menuData[categoryKey];
      if (!data) return;
      
      let itemsHTML = '';
      data.items.forEach(item => {
        itemsHTML += `
          <div class="menu-card">
            <div class="card-header">
              <h3 class="dish-title">${item.title}</h3>
              <span class="dish-price">${item.price}</span>
            </div>
            <p class="dish-desc">${item.desc}</p>
          </div>
        `;
      });

      menuView.innerHTML = `
        <div class="fade-in-up">
          <h2 class="category-section-title">${categoryKey}</h2>
          <p class="category-section-desc">${data.desc}</p>
          <div class="menu-grid">${itemsHTML}</div>
        </div>
      `;
    }

    Object.keys(menuData).forEach((category, index) => {
      const tab = document.createElement('button');
      tab.className = `slider-item ${index === 0 ? 'active' : ''}`;
      tab.innerText = category;
      
      tab.addEventListener('click', () => {
        document.querySelectorAll('.slider-item').forEach(item => item.classList.remove('active'));
        tab.classList.add('active');
        tab.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
        updateIndicator(tab);
        displayCategory(category);
      });

      track.appendChild(tab);
    });

    arrowLeft.addEventListener('click', () => wrapper.scrollBy({ left: -200, behavior: 'smooth' }));
    arrowRight.addEventListener('click', () => wrapper.scrollBy({ left: 200, behavior: 'smooth' }));
    wrapper.addEventListener('scroll', handleArrowsVisibility);

    window.addEventListener('load', () => {
      const firstTab = track.querySelector('.slider-item');
      displayCategory(Object.keys(menuData)[0]);
      setTimeout(() => {
        updateIndicator(firstTab);
        handleArrowsVisibility();
      }, 150);
    });

    window.addEventListener('resize', () => {
      const activeTab = track.querySelector('.slider-item.active');
      updateIndicator(activeTab);
      handleArrowsVisibility();
    });
  </script>
